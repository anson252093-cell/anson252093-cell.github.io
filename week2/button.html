<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>button</title>
    <style>
        button {
            padding: 10px 15px 10px 15px;
            color: white;
            background-color: black;
            margin: 5px;
            font-weight: normal;

        }

        button.sign {
            color: white;
            background-color: rgb(84, 162, 89);
            border: 2px solid rgb(84, 162, 89);
            padding: 6px 20px 6px 20px;
            border-radius: 5px;
            font-weight: bold;
        }

        button.add {
            color: black;
            background-color: rgb(249, 218, 78);
            padding: 10px 45px 10px 45px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
        }

        button.get {
            color: white;
            background-color: rgb(115, 84, 173);
            border: 2px solid rgb(115, 84, 173);
            border-radius: 5px;
            padding: 10px 20px 10px 20px;
        }

        button.down {
            color: rgb(112, 119, 127);
            background-color: white;
            border: 1px solid rgb(112, 119, 127);
            border-radius: 3px;
            font-weight: bold;
            padding: 10px 20px 10px 20px
        }

        button.apply {
            color: white;
            background-color: rgb(45, 101, 188);
            border: 1px solid rgb(46, 101, 188);
            border-radius: 20px;
            font-weight: bold;
            padding: 10px 20px 10px 20px;
        }

        button.save {
            color: rgb(58, 107, 188);
            background-color: white;
            border: 1px solid rgb(58, 107, 188);
            border-radius: 27px;
            padding: 10px 25px 10px 25px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <button class="request">Request Now</button>
    <button class="sign">Sign up</button>
    <button class="add">Add to Cart</button>
    <button class="get">Get Started</button>
    <button class="down">Download</button>
    <button class="apply">Apply on company website</button>
    <button class="save">Save</button>
</body>

</html>
