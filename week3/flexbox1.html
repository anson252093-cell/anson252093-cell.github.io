<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: rgb(246, 245, 239);
        }

        div.container {
            display: flex;
            /*往上面拍去下面*/
            justify-content: space-around;
            /*vertically alignment*/
            align-items: flex-start;
            /*Distance*/
            gap: 10px;
        }

        div.building {
            width: 30%;
            /*height: 200px;*/
            background-color: white;
            border: 1px solid none;
            border-radius: 10px;
            padding: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="building"><img src="images/pic1.jpg" alt="Image 1" width="100%">
            <h1>Residential Project</h1>Residential Project
        </div>
        <div class="building"><img src="images/pic2.jpg" alt="Image 2" width="100%">
            <h1>Commercial spaces</h1>
        </div>
        <div class="building"><img src="images/pic3.jpg" alt="Image 3" width="100%">
            <h1>Infrastructure works</h1>
        </div>
    </div>

</body>

</html>
