<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementra</title>
    <style>
        body {
            background-color: rgb(246, 245, 239);
            font-family: Arial, Helvetica, sans-serif;

        }

        div.container {
            display: flex;
            /*往上面拍去下面*/
            justify-content: space-evenly;
            /*vertically alignment*/
            align-items: flex-start;
            /*Distance*/
            gap: 30px;
            padding: 20px;
            word-wrap: break-word;
            margin: auto;
            width: 1024px;


        }

        div.building {
            width: 30%;
            /*height: 200px;*/
            background-color: white;
            border: 1px solid none;
            border-radius: 10px;
            padding: 20px;
            max-width: 400px;
            align-items: center;
        }

        img {
            border-radius: 10px;
        }

        div.word {
            margin: 20px 10px 15px 10px;
            letter-spacing: normal;

        }

        p {
            font-weight: 100;
            font-size: 14px;
            color: gray;
            line-height: 20px;
        }

        h1 {
            font-size: 22px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="building"><img src="images/pic1.jpg" alt="Image 1" width="100%">

            <div class="word">
                <h1>Residential Projects</h1>
                <p>We build sustainable and modern homes for comfortable living.</p>
            </div>

        </div>
        <div class="building"><img src="images/pic2.jpg" alt="Image 2" width="100%">

            <div class="word">
                <h1>Commercial spaces</h1>
                <p>We create efficient, inspiring workspaces for businesses of all sizes.</p>
            </div>
        </div>
        <div class="building"><img src="images/pic3.jpg" alt="Image 3" width="100%">

            <div class="word">
                <h1>Infrastructure works</h1>
                <p>We develop strong, reliable infrastructure for growing businesses.</p>
            </div>
        </div>
    </div>

</body>

</html>
