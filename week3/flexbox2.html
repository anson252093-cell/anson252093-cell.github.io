<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positive homepage</title>
    <style>
        body {
            font-family: arial;
            padding: 30px 40px 30px 40px;
        }

        div.header {
            display: flex;
            gap: 10px;
            justify-content: space-between;
            align-items: center;
            padding: 0px 20px 0px 20px;
            font-size: 20px;

        }

        div.logo {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        div.menu_container {
            display: flex;
            gap: 60px;
            align-items: center;
        }

        button.request {
            color: black;
            background-color: white;
            border: 1px solid black;
            border-radius: 10px;
            padding: 20px 30px 20px 30px;
            font-size: 20px;

        }

        p {
            font-size: 20px;

        }

        div.body_container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 40px;
            padding: 30px 20px 30px 20px;

        }

        div.para {
            /* font-size: 60px; */
            padding-top: 0px;
        }

        h1.navigate {
            font-size: 60px;

        }

        p.our {
            font-size: 20px;

        }

        button.book {
            color: white;
            background-color: black;
            border-radius: 10px;
            padding: 20px;
            font-size: 20px;

        }

        div.footer {
            display: flex;
            gap: 20px;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding: 0px 20px 0px 20px;
            max-width: 100%;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">
            <img src="images/Icon.jpg" alt="Logo" width="35px">
            <h1>Positivus</h1>
        </div>
        <div class="menu_container">

            <div>About us</div>
            <div>Services</div>
            <div>Use Cases</div>
            <div>Pricing</div>
            <div>Blog</div>
            <div><button class="request">Request a quote</button></div>
        </div>
    </div>

    <div class="body_container">
        <div class="para">
            <h1 class="navigate">Navigating the<br> digital landscape<br> for success</h1>
            <p class="our">Our digital marketing agency helps businesses<br> grow and succeed online through a range
                of<br> services
                including
                SEO, PPC, social media marketing,<br> and content creation.</p>
            <p>
                <button class="book">Book a consultation</button>
            </p>
        </div>
        <img src="images/illustration.png" alt="Illustration" width="40%">
    </div>

    <div class="footer">
        <div><img src="images/amazon.png" alt="Logo" width="100%"></div>
        <div><img src="images/dribbles.png" alt="Logo" width="100%"></div>
        <div><img src="images/hubsript.png" alt="Logo" width="100%"></div>
        <div><img src="images/notion.png" alt="Logo" width="100%"></div>
        <div><img src="images/netflix.png" alt="Logo" width="100%"></div>
        <div><img src="images/zoom.png" alt="Logo" width="100%"></div>
    </div>





</body>

</html>
