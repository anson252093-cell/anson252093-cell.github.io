<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positive homepage</title>
    <style>
        body {
            font-family: arial;
            padding: 20px 30px 20px 30px;
        }

        div.header {
            display: flex;
            gap: 10px;
            justify-content: space-between;
            align-items: center;

        }

        div.logo {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        div.menu_container {
            display: flex;
            gap: 60px;
            align-items: center;
        }

        div.request {
            color: black;
            border: 1px solid black;
            border-radius: 3px;
            padding: 10px;

        }

        div.body_container {
            font-size: 40px;
        }

        p {
            font-size: 20px;

        }

        div.body_container {
            display: flex;
            justify-content: space-between;
            align-items: center;

        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">
            <img src="images/Icon.jpg" alt="Logo" width="35px">
            <h1>Positivus</h1>
        </div>
        <div class="menu_container">

            <div>About us</div>
            <div>Services</div>
            <div>Use Cases</div>
            <div>Pricing</div>
            <div>Blog</div>
            <div class="request">Request a quote</div>
        </div>
    </div>

    <div class="body_container">
        <div class="para">
            <h1 class="navigate">Navigating the<br> digital landscape<br> for success</h1>
            <p>Our digital marketing agency helps businesses<br> grow and succeed online through a range of<br> services
                including
                SEO, PPC, social media marketing,<br> and content creation.</p>
            <p>Book a consultation</p>
        </div>
        <img src="images/illustration.png" alt="Illustration" width="50%">
    </div>


</body>

</html>
