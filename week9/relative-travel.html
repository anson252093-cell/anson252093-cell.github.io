<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/relative-travel.css">
</head>

<body>
    <div class="travel">
        <div class="travelbox">
            <div class="image"><img src="images/norway.jpg" alt="Norway" width="100%"></div>
            <h3>Trip to Norway</h3>
            <p>14-29 June| by Jimmy choo</p>
            <div class="icon">
                <img src="images/eco.png" alt="eco" width="24px">
                <img src="images/map.png" alt="map" width="24px">
                <img src="images/send.png" alt="send" width="24px">
            </div>
            <div class="event">
                <div class="people"><img src="images/building.png" alt="building" width="24px"><span>24 people
                        going</span>
                </div>
                <div><img src="images/heart.png" alt="fav" width="24px">
                </div>
            </div>
            <div class="absolutebox">
                <div class="citypic"><img class="city" src="images/cirtyofnorway.jpg" alt="City of Norway" width="50px">
                </div>
                <div class="citytext">
                    <p>On going</p>
                    <h3>City of Oslo</h3>
                    <p><span>40%</span>completed</p>
                </div>
            </div>
        </div>
        <div class="travelbox">
            <div class="image"><img src="images/hk.jpg" alt="Hong Kong" width="100%"></div>
            <h3>Trip to Hong Kong</h3>
            <p>12-25 November| by Alex fong</p>
            <div class="icon">
                <img src="images/eco.png" alt="eco" width="24px">
                <img src="images/map.png" alt="map" width="24px">
                <img src="images/send.png" alt="send" width="24px">
            </div>
            <div class="event">
                <div class="people"><img src="images/building.png" alt="building" width="24px"><span>35 people
                        going</span>
                </div>
                <div><img src="images/heart.png" alt="fav" width="24px"></div>
            </div>
            <div class="absolutebox">
                <div class="citypic"><img class="city" src="images/hkcity.jpg" alt="City of Norway" width="50px">
                </div>
                <div class="citytext">
                    <p>On going</p>
                    <h3>City of Oslo</h3>
                    <p class="completed"><span>40%</span>completed</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
