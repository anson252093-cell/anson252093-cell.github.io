<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="travel">
        <div class="travelbox">
            <img src="images/norway.jpg" alt="Norway" width="100%">
            <h3>Trip to Norway</h3>
            <p>14-29 June| by Jimmy choo</p>
            <div class="icon">
                <img src="images/eco.png" alt="eco" width="24px">
                <img src="images/map.png" alt="map" width="24px">
                <img src="images/send.png" alt="send" width="24px">
            </div>
            <div class="event">
                <div class="people"><img src="images/building.png" alt="building" width="24px"><span>24 people
                        going</span>
                </div>
                <div><img src="images/heart.png" alt="fav" width="24px"></div>
            </div>
        </div>
        <div class="travelbox">
            <img src="images/hk.jpg" alt="Hong Kong" width="100%">
            <h3>Trip to Hong Kong</h3>
            <p>12-25 November| by Alex fong</p>
            <div class="icon">
                <img src="images/eco.png" alt="eco" width="24px">
                <img src="images/map.png" alt="map" width="24px">
                <img src="images/send.png" alt="send" width="24px">
            </div>
            <div class="event">
                <div class="people"><img src="images/building.png" alt="building" width="24px"><span>35 people
                        going</span>
                </div>
                <div><img src="images/heart.png" alt="fav" width="24px"></div>
            </div>
        </div>
        <div class="travelbox">
            <img src="images/beijing.jpg" alt="Beijing" width="100%">
            <h3>Trip to Beijing</h3>
            <p>12-25 December| by June Zhang</p>
            <div class="icon">
                <img src="images/eco.png" alt="eco" width="24px">
                <img src="images/map.png" alt="map" width="24px">
                <img src="images/send.png" alt="send" width="24px">
            </div>
            <div class="event">
                <div class="people"><img src="images/building.png" alt="building" width="24px"><span>39 people
                        going</span>
                </div>
                <div><img src="images/heart.png" alt="fav" width="24px"></div>
            </div>
        </div>
    </div>
</body>

</html>
